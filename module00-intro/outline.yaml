title: Welcome to Unix for design
footer: learn_unix — intro
slides:
- type: title
  title: Welcome to Unix for design
  subtitle: If you work in digital design or verification, you will live in a shell
  notes: If you work in digital design or verification, you will live in a shell.
    You will open projects, run simulators, skim logs, and move files—all from a terminal.
    This short clip welcomes you to learn Unix, and shows how the course is meant
    to be used.
- type: bullets
  title: Why the shell matters
  bullets:
  - Chip and verification work sits on real files and real tools
  - A graphical editor helps you write RTL, but Make, Git, Icarus, Verilator
  - Getting comfortable here pays off in every later course
  notes: Chip and verification work sits on real files and real tools. A graphical
    editor helps you write RTL, but Make, Git, Icarus, Verilator, and log triage all
    assume you can navigate a tree, run a command, and read what came back. Getting
    comfortable here pays off in every later course.
- type: bullets
  title: Two tracks, one idea
  bullets:
  - Every lab module offers two ways to practice
  - Scripts feel real
  - The browser lab track uses interactive tools on the learning platform
  - You may do either track, or both
  - The usual rhythm is browser first for the idea, then the real shell for muscle
    memory
  notes: Every lab module offers two ways to practice. The real Unix track uses your
    own terminal—Linux, macOS, or WSL on Windows—so paths, permissions, and scripts
    feel real. The browser lab track uses interactive tools on the learning platform,
    so you can build intuition without installing anything. You may do either track,
    or both. The usual rhythm is browser first for the idea, then the real shell for
    muscle memory.
- type: bullets
  title: Set up the real Unix track
  bullets:
  - Open a terminal
  - On Windows, prefer WSL
  - From the learn Unix course folder, run the scaffold script once
  - It creates a small practice tree under your home directory where checklist exercises
    can
  - You will come back to that tree throughout the course
  notes: Open a terminal. On Windows, prefer WSL. From the learn Unix course folder,
    run the scaffold script once. It creates a small practice tree under your home
    directory where checklist exercises can live safely. You will come back to that
    tree throughout the course.
- type: bullets
  title: Set up the browser lab track
  bullets:
  - From the monorepo
  - If you prefer, use the published tools site instead
  - Either way, you only need to confirm you can reach the labs, the next module will
    send you
  notes: From the monorepo, serve the platform folder with a simple local web server,
    then open the tools index in your browser. If you prefer, use the published tools
    site instead. Either way, you only need to confirm you can reach the labs—the
    next module will send you into a specific one.
- type: bullets
  title: How to move through modules
  bullets:
  - For each module
  - When you finish this intro checklist, continue to the first lab module
  notes: 'For each module, read the README for the outcome, pick a track—or both—then
    work the checklist. When you finish this intro checklist, continue to the first
    lab module: the virtual filesystem terminal.'
