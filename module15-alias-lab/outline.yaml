title: Alias & functions
footer: learn_unix — alias lab
slides:
- type: title
  title: Alias & functions
  subtitle: Typing the same long command again and again is slow
  notes: Typing the same long command again and again is slow. An alias is a short
    name for a fixed command string. A shell function is a named block that can take
    arguments and run several steps. This module shows when to use each—and how they
    differ from a separate script file.
- type: bullets
  title: Shortcut vs helper with args
  bullets:
  - An alias expands to text before the shell runs the line
  - Aliases are awkward with real arguments; prefer a function when you need `$1`
    or `"$@"`
  - Functions run in the current shell, so they can change directory or set variables
    for you
  - Scripts run in a subshell, better when you want a file to share and version
  - Session aliases and functions vanish when the shell exits unless you add them
    to your
  notes: An alias expands to text before the shell runs the line—great for `ll` meaning
    a long listing. Aliases are awkward with real arguments; prefer a function when
