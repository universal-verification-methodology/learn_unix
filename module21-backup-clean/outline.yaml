title: Backup and clean-build
footer: learn_unix — backup clean
slides:
- type: title
  title: Backup and clean-build
  subtitle: Build folders and logs grow fast, waveforms, object files, run logs
  notes: Build folders and logs grow fast—waveforms, object files, run logs. Before
    you wipe them, take a timestamped backup of the sources you care about. Then list
    what a clean would remove, and only then delete. This module is the backup-first,
    clean-second habit for every chip project tree.
- type: bullets
  title: Timestamp, exclude, then clean
  bullets:
  - Name archives with a date stamp so versions do not overwrite each other
  - Exclude build and logs from the backup when you only need sources, docs, and scripts
  - 'For clean: list files under build and logs first'
  - Align exclude patterns with your ignore file so archives and Git stay consistent
  notes: 'Name archives with a date stamp so versions do not overwrite each other.
    Exclude build and logs from the backup when you only need sources, docs, and scripts.
    For clean: list files under build and logs first, then remove—never start with
    a blind recursive delete. Align exclude patterns with your ignore file so archives
    and Git stay consistent.'
- type: image
  title: Browser lab
  image: assets/lab-starter.png
  caption: Backup and clean lab
  notes: 'In the browser lab, load the starter example. Follow the steps: backup to
    a timestamped tar, dry-run clean, then clean for real—the lab refuses clean until
    you back up. Orient yourself with the step strip, the project tree, and the action
    buttons, try a few challenges, then practice on a real shell.'
- type: image
  title: Real shell practice
  image: assets/real-shell.png
  caption: Real shell — backup then list clean targets
  notes: In the real Unix track, open the clean-build sample project. List the generated
    files under build and logs. Create a timestamped tar of the project while excluding
    those generated dirs, then list the archive. Run find again as a dry-run of what
    a clean would remove—only run the clean script when you mean to empty those folders.
    You will reuse backup-then-clean before every big rebuild or share.
- type: code
  title: Real shell practice — try these
  code: "# find … -type f — list generated files under build/ and logs/\nfind sample_project/build\
    \ sample_project/logs -type f\n\n# tar czf backup_….tar.gz — timestamped archive\
    \ excluding build and logs\ntar czf /tmp/m21_backup_demo.tar.gz \\\n  --exclude='build'\
    \ --exclude='logs' \\\n  -C sample_project .\n\n# tar tzf … — list what was backed\
    \ up (no build/logs)\ntar tzf /tmp/m21_backup_demo.tar.gz\n\n# find again — dry-run\
    \ view of clean targets (do not delete yet)\nfind sample_project/build sample_project/logs\
    \ -type f\n\n# ./clean.sh — only when ready: delete files in build/ and logs/\n\
    # chmod u+x clean.sh && ./clean.sh\n"
- type: bullets
  title: Pitfalls to watch
  bullets:
  - Never clean before you have a backup you can restore
  - Do not run recursive delete on a path you have not listed
  - And remember
  notes: 'Never clean before you have a backup you can restore. Do not run recursive
    delete on a path you have not listed. And remember: the browser lab shows the
    idea; lasting project hygiene still means real archives and careful cleans on
    a real shell.'
- type: bullets
  title: Your turn
  bullets:
  - Complete the checklist for at least one track, preferably both
  - In the browser, finish the backup → dry-run → clean flow
  - On the real shell, make a timestamped archive and list clean targets before you
    delete
  - When you are ready, take the short quiz, then continue to relative symlink pitfalls
  notes: Complete the checklist for at least one track—preferably both. In the browser,
    finish the backup → dry-run → clean flow. On the real shell, make a timestamped
    archive and list clean targets before you delete. When you are ready, take the
    short quiz, then continue to relative symlink pitfalls.
