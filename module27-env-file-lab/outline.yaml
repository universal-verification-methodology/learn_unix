title: Dot-env literacy
footer: learn_unix — env file lab
slides:
- type: title
  title: Dot-env literacy
  subtitle: Toolchains need paths and flags, TOOLS, SIM, WAVE, without hard-coding
    secrets in scripts you commit
  notes: Toolchains need paths and flags—TOOLS, SIM, WAVE—without hard-coding secrets
    in scripts you commit. A dot-env file holds KEY equals value lines you source
    locally. This module covers load order, example versus real env files, and keeping
    secrets out of Git.
- type: bullets
  title: Source, layers, and Git
  bullets:
  - Source or dot loads the file into the current shell
  - Commit a safe example template; keep the real env file gitignored
  - Later layers win, local overrides, then shell exports
  - Never commit tokens or private paths; document the keys teammates must set
  notes: Source or dot loads the file into the current shell. Commit a safe example
    template; keep the real env file gitignored. Later layers win—local overrides,
    then shell exports. Never commit tokens or private paths; document the keys teammates
    must set.
- type: image
  title: Browser lab
  image: assets/lab-starter.png
  caption: Env file lab
  notes: In the browser lab, load the starter example. You will see a chip project
    with an example file, a real env file, and optional local overrides. Load env
    and watch which layer wins for each key. Orient yourself with the file tabs, the
    resolved table, and the challenge strip, then practice sourcing on a real shell.
- type: image
  title: Real shell practice
  image: assets/real-shell.png
  caption: Real shell — source env
  notes: In the real Unix track, open this module’s env-file example. List the files
    and show the sample env so you see KEY equals value lines and comments. Make the
    helper script executable and run it—it sources the file and prints the variables.
    Then source the file in your shell and echo the values yourself. You will reuse
    this whenever a Make or sim flow expects TOOLS or similar settings.
- type: code
  title: Real shell practice — try these
  code: '# pwd — print working directory (where am I?)

    pwd


    # ls -la — list all entries, long format (what is here?)

    ls -la


    # cat sample.env — show KEY=value lines (and comments)

    cat sample.env


    # chmod u+x use_env.sh — make the helper script executable

    chmod u+x use_env.sh


    # ./use_env.sh — source sample.env inside the script and print vars

    ./use_env.sh


    # source sample.env — load vars into the current shell

    source sample.env


    # echo MY_VAR=... — confirm MY_VAR is set after sourcing

    echo MY_VAR=$MY_VAR


    # echo ANOTHER_VAR=... — confirm ANOTHER_VAR is set

    echo ANOTHER_VAR=$ANOTHER_VAR

    '
- type: bullets
  title: Pitfalls to watch
  bullets:
  - Do not commit a real env file with secrets
  - Do not put spaces around the equals sign in KEY equals value lines
  - And remember
  notes: 'Do not commit a real env file with secrets. Do not put spaces around the
    equals sign in KEY equals value lines. And remember: the browser lab shows load
    order; lasting habit means sourcing a local file on a real shell before blaming
    the RTL.'
