title: Makefile basics
footer: learn_unix — make basics
slides:
- type: title
  title: Makefile basics
  subtitle: Make reads a Makefile and runs named targets
  notes: 'Make reads a Makefile and runs named targets—build, run, clean, help—so
    you do not retype long compile and sim commands. This module covers the basics
    you will use in every RTL and verification project: default targets, dependencies,
    and phony names that are not real files.'
- type: bullets
  title: Targets, deps, and .PHONY
  bullets:
  - A rule is a target, optional dependencies, then a tab-indented recipe
  - Make rebuilds when the target is missing or older than a dependency
  - Names like clean are usually marked .PHONY so Make always runs them even if a
    file with
  - Default make often means all or the first target, here, build
  notes: A rule is a target, optional dependencies, then a tab-indented recipe. Make
    rebuilds when the target is missing or older than a dependency. Names like clean
    are usually marked .PHONY so Make always runs them even if a file with that name
    exists. Default make often means all or the first target—here, build.
- type: image
  title: Browser lab
  image: assets/lab-starter.png
  caption: Makefile basics lab
  notes: In the browser lab, load the starter example. You will see a tiny chip Makefile,
    variables like SIM and TB, a file tree, and make buttons. Run make sim, touch
    RTL, run again, and watch what rebuilds. Orient yourself with the challenge strip
    and the Makefile panel, then practice the same ideas on a real shell.
- type: image
  title: Real shell practice
  image: assets/real-shell.png
  caption: Real shell — make targets
  notes: In the real Unix track, open the sample project under this module’s examples.
    Print where you are, then list the tree so you see the Makefile beside src and
    tb. Ask Make for help, run the default build, run the demo target that writes
    a log, list build and logs, then clean and list again. You will reuse these targets
    in every course project that ships a Makefile.
- type: code
  title: Real shell practice — try these
  code: '# pwd — print working directory (where am I?)

    pwd


    # ls -la — list all entries, long format (what is here?)

    ls -la


    # make help — list available targets

    make help


    # make — default target (all → build); creates build/ and logs/

    make


    # make run — depends on build; appends a line to logs/run.log

    make run


    # ls -la build logs — confirm generated dirs and the run log

    ls -la build logs


    # make clean — remove generated files under build/ and logs/

    make clean


    # ls build logs — verify cleanup left the directories tidy

    ls build logs

    '
- type: bullets
  title: Pitfalls to watch
  bullets:
  - Run make from the project root so paths in the Makefile resolve
  - Recipes must use a real tab, not spaces
  - Do not create a file named clean if clean is a phony target, or mark it .PHONY
  - And remember
  notes: 'Run make from the project root so paths in the Makefile resolve. Recipes
    must use a real tab, not spaces. Do not create a file named clean if clean is
    a phony target—or mark it .PHONY. And remember: the browser lab teaches the ideas;
    lasting skill means running make on a real shell.'
- type: bullets
  title: Your turn
