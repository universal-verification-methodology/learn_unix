title: sort / uniq / cut
footer: learn_unix — sort uniq cut
slides:
- type: title
  title: sort / uniq / cut
  subtitle: Logs and lists are messy until you order them, collapse duplicates, and
    pull out columns
  notes: Logs and lists are messy until you order them, collapse duplicates, and pull
    out columns. sort orders lines. uniq drops adjacent duplicates—so you almost always
    sort first. cut extracts fields by delimiter or character position. This module
    is the text-processing trio you will chain after grep.
- type: bullets
  title: Order, dedupe, and columns
  bullets:
  - Alphabetical sort is the default; numeric sort with dash-n puts ten after two,
    not before
  - Uniq only collapses neighbors, so sort then uniq is the classic dedupe
  - Uniq with dash-c prints a count beside each unique line
  - 'Remember: uniq without sort misses scattered duplicates'
  notes: 'Alphabetical sort is the default; numeric sort with dash-n puts ten after
    two, not before. uniq only collapses neighbors, so sort then uniq is the classic
    dedupe. uniq with dash-c prints a count beside each unique line—great for “how
    often did this error appear?” cut with a comma delimiter and field list pulls
    columns from CSV-like lines. Remember: uniq without sort misses scattered duplicates.'
- type: image
  title: Browser lab
  image: assets/lab-starter.png
  caption: sort uniq cut lab
  notes: In the browser lab, load the starter example. The usual first pipeline is
    sort names into uniq with counts. Try a numeric sort on the numbers file, then
    cut the first field from the CSV-like file. Orient yourself with the terminal
    and the file list, try a few challenges, then practice on a real shell.
- type: image
  title: Real shell practice
  image: assets/real-shell.png
  caption: Real shell — sort and uniq
  notes: In the real Unix track, open this module’s sort-uniq example. Show the names
    file with duplicates. Sort it, then sort into uniq, then sort into uniq with counts
    so you see frequencies. Sort the numbers file the default way—notice the wrong
    order—then sort numerically. When you want columns, use the cut-columns example
    with cut and a comma delimiter. You will reuse sort-pipe-uniq-count on real error
    logs.
- type: code
  title: Real shell practice — try these
  code: '# cat names.txt — see the raw list with duplicates

    cat names.txt


    # sort names.txt — alphabetical order (duplicates become adjacent)

    sort names.txt


    # sort names.txt | uniq — unique lines after sorting

    sort names.txt | uniq


    # sort names.txt | uniq -c — unique lines with occurrence counts

    sort names.txt | uniq -c


    # sort numbers.txt — default (lexicographic) order — often wrong for numbers

    sort numbers.txt


    # sort -n numbers.txt — numeric sort (1, 2, 5, 10, …)

    sort -n numbers.txt

    '
- type: bullets
  title: Pitfalls to watch
  bullets:
  - Running uniq alone on an unsorted file skips non-adjacent duplicates, sort first
  - Do not confuse lexicographic sort with numeric sort for version numbers or sizes
  - And remember
  notes: 'Running uniq alone on an unsorted file skips non-adjacent duplicates—sort
    first. Do not confuse lexicographic sort with numeric sort for version numbers
    or sizes. And remember: the browser lab shows the idea; real log analysis still
    needs these tools on a real shell.'
- type: bullets
  title: Your turn
  bullets:
