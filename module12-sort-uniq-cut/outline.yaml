  - In the browser, finish a few challenges after the starter
  - On the real shell, practice sort, uniq dash-c
  - When you are ready, take the short quiz, then continue to here-documents and here-strings
  notes: Complete the checklist for at least one track—preferably both. In the browser,
    finish a few challenges after the starter. On the real shell, practice sort, uniq
